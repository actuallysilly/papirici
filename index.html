<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papirici ♥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- ── UI Overlay ── -->
  <div id="ui">

    <div id="title-bar">
      <h1 id="title">Papirici <span class="heart">♥</span></h1>
    </div>

    <!-- Player Selection -->
    <div id="screen-player" class="screen active">
      <div class="screen-content">
        <p class="subtitle">A little box of adventures</p>
        <div class="player-grid">
          <button class="player-btn pink" onclick="app.selectPlayer('pink')">
            <span class="player-icon">🌸</span>
            <span class="player-label" id="label-pink">Her</span>
          </button>
          <button class="player-btn blue" onclick="app.selectPlayer('blue')">
            <span class="player-icon">💙</span>
            <span class="player-label" id="label-blue">Him</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Main Screen -->
    <div id="screen-main" class="screen">
      <div class="top-bar">
        <div class="count-display">
          <div class="count-item">
            <span class="count-dot blue-dot"></span>
            <span id="num-blue">0</span>
          </div>
          <div class="count-item">
            <span class="count-dot white-dot"></span>
            <span id="num-white">0</span>
          </div>
          <div class="count-item">
            <span class="count-dot pink-dot"></span>
            <span id="num-pink">0</span>
          </div>
        </div>
        <div class="top-right">
          <div id="player-indicator"></div>
          <button class="btn-ghost small" onclick="app.switchPlayer()">Switch</button>
          <button class="btn-ghost small icon-btn" onclick="app.openSettings()" title="Settings">⚙</button>
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary" id="btn-draw" onclick="app.draw()">
          Draw Mission <span class="sparkle">✨</span>
        </button>
        <button class="btn-secondary" onclick="app.openAddModal()">Add Mission +</button>
      </div>
    </div>

  </div>

  <!-- ── Add Mission Modal ── -->
  <div id="modal-add" class="modal">
    <div class="modal-backdrop" onclick="app.closeAddModal()"></div>
    <div class="modal-content">
      <h2>New Mission</h2>
      <div class="form-group">
        <textarea
          id="mission-text"
          placeholder="Write a romantic date idea…"
          maxlength="220"
          rows="4"
        ></textarea>
        <div class="char-count"><span id="char-count">0</span>&thinsp;/&thinsp;220</div>
      </div>
      <div class="for-row">
        <span class="for-label">For:</span>
        <div class="chip-group">
          <button class="chip blue-chip" data-color="blue" onclick="app.selectColor('blue')">💙 <span id="chip-blue">Him</span></button>
          <button class="chip pink-chip" data-color="pink" onclick="app.selectColor('pink')">💗 <span id="chip-pink">Her</span></button>
          <button class="chip white-chip active" data-color="white" onclick="app.selectColor('white')">🤍 Both</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="app.submitMission()">Add ✓</button>
        <button class="btn-ghost" onclick="app.closeAddModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Settings Modal ── -->
  <div id="modal-settings" class="modal">
    <div class="modal-backdrop" onclick="app.closeSettings()"></div>
    <div class="modal-content settings-card">
      <h2>Settings</h2>

      <div class="setting-section-label">Names</div>
      <div class="setting-row name-row">
        <label class="setting-label" for="name-pink">🌸 Her name</label>
        <input id="name-pink" class="setting-input" type="text" maxlength="20" placeholder="Her">
      </div>
      <div class="setting-row name-row">
        <label class="setting-label" for="name-blue">💙 His name</label>
        <input id="name-blue" class="setting-input" type="text" maxlength="20" placeholder="Him">
      </div>

      <div class="setting-divider"></div>

      <div class="setting-row toggle-row">
        <div class="setting-label">
          Custom missions only
          <small>When on, only missions you added yourself will be drawn</small>
        </div>
        <button class="toggle-btn" id="toggle-ai" onclick="app.toggleAI()">
          <span class="toggle-dot"></span>
        </button>
      </div>

      <div class="modal-actions">
        <button class="btn-primary" onclick="app.saveSettings()">Save</button>
        <button class="btn-ghost" onclick="app.closeSettings()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Reveal Modal ── -->
  <div id="modal-reveal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content reveal-card">
      <div id="paper-sheet" class="paper-sheet">
        <div class="paper-lines"></div>
        <div id="reveal-text" class="reveal-text"></div>
      </div>
      <div id="reveal-label" class="reveal-label"></div>
      <div class="modal-actions center">
        <button class="btn-primary" onclick="app.closeReveal()">Lovely! ♥</button>
      </div>
    </div>
  </div>

  <!-- ── Empty Modal ── -->
  <div id="modal-empty" class="modal">
    <div class="modal-backdrop" onclick="app.closeEmpty()"></div>
    <div class="modal-content empty-card">
      <div class="empty-icon">📭</div>
      <h3>Box is empty!</h3>
      <p>No missions available for you yet.<br>Add some adventures first!</p>
      <button class="btn-primary" onclick="app.closeEmpty()">Got it</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
